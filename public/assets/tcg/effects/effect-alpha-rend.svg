<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800" role="img" aria-label="Alpha Rend">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#451a03"/><stop offset=".55" stop-color="#7c2d12"/><stop offset="1" stop-color="#020617"/></linearGradient>
  <radialGradient id="shine" cx="35%" cy="18%" r="70%"><stop offset="0" stop-color="white" stop-opacity=".55"/><stop offset=".45" stop-color="#f97316" stop-opacity=".18"/><stop offset="1" stop-color="#000" stop-opacity="0"/></radialGradient>
  <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fff" stop-opacity=".85"/><stop offset=".22" stop-color="#f97316" stop-opacity=".85"/><stop offset=".5" stop-color="#111827"/><stop offset=".82" stop-color="#f97316" stop-opacity=".9"/><stop offset="1" stop-color="#fff" stop-opacity=".65"/></linearGradient>
